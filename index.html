<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>ADOFAI 谱面处理工具</title>
  <style>
    :root {
      --bg-root: #090b11;
      --bg-panel: #11141f;
      --bg-elevated: #181c2a;
      --bg-input: #0b0d14;
      --border: #1e2132;
      --border-focus: #4b7fff;
      --text-primary: #e4e6f0;
      --text-secondary: #8b8fa6;
      --text-muted: #555a70;
      --accent: #3b7dff;
      --accent-hover: #5a94ff;
      --accent-soft: rgba(59, 125, 255, 0.12);
      --success: #3dd68c;
      --success-bg: rgba(61, 214, 140, 0.12);
      --warn: #ffd479;
      --warn-bg: rgba(255, 212, 121, 0.12);
      --danger: #ff5e5e;
      --radius-sm: 6px;
      --radius: 8px;
      --radius-lg: 10px;
      --shadow: 0 1px 3px rgba(0,0,0,.3);
    }
    * { box-sizing: border-box; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2e40; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3a3f55; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", system-ui, sans-serif;
      background: var(--bg-root);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Header ─── */
    header {
      padding: 10px 18px;
      background: var(--bg-panel);
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      height: 48px;
    }
    header h1 {
      font-size: 14px;
      margin: 0 8px 0 0;
      white-space: nowrap;
      font-weight: 600;
      letter-spacing: .02em;
      color: var(--text-primary);
    }
    header .file-name {
      font-size: 12px;
      color: var(--accent);
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 2px 8px;
      background: var(--accent-soft);
      border-radius: 4px;
    }
    header .file-name:empty { display: none; }
    header button {
      padding: 5px 14px;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all .15s ease;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    header button:active { transform: scale(.97); }
    header .btn-primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    header .btn-primary:hover { background: var(--accent-hover); }
    header .btn-secondary {
      background: var(--bg-elevated);
      color: var(--text-secondary);
      border-color: var(--border);
    }
    header .btn-secondary:hover { color: var(--text-primary); border-color: #3a3f55; }
    header input[type="file"] { display: none; }

    /* ─── Main Grid ─── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 260px 1fr 320px;
      overflow: hidden;
    }

    /* ─── Panels ─── */
    aside, section.tools {
      background: var(--bg-panel);
      overflow-y: auto;
      padding: 14px;
    }
    aside { border-right: 1px solid var(--border); }
    section.tools {
      border-left: 1px solid var(--border);
    }
    section.editor {
      background: var(--bg-root);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ─── Section Headings ─── */
    h2 {
      font-size: 12px;
      margin: 0 0 10px 0;
      color: var(--text-secondary);
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ─── View Switch ─── */
    .editor-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toggle-readonly {
      font-size: 11px;
      padding: 3px 10px;
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
      transition: all .15s ease;
    }
    .toggle-readonly:hover { color: var(--text-secondary); border-color: #3a3f55; }
    .toggle-readonly.editing {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .fold-btns {
      display: inline-flex;
      gap: 0;
      margin-left: 6px;
      background: var(--bg-input);
      border-radius: var(--radius-sm);
      padding: 2px;
    }
    .fold-btns button {
      font-size: 13px;
      padding: 2px 6px;
      background: transparent;
      color: var(--text-muted);
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: all .15s ease;
      line-height: 1;
      font-family: monospace;
    }
    .fold-btns button:hover { color: var(--text-primary); background: var(--bg-elevated); }
    .fold-btns button:active { transform: scale(.95); }

    /* ─── Monaco Editor Container ─── */
    #monacoContainer {
      flex: 1;
      overflow: hidden;
    }

    /* ─── Info Boxes (left panel) ─── */
    #tagBox, #eventBox {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      font-size: 12px;
      line-height: 1.8;
      word-break: break-all;
      min-height: 44px;
      transition: border-color .2s;
      height: 300px;
      overflow-y: auto;
    }
    #tagBox { margin-bottom: 0; }
    #eventBox { margin-top: 0; max-height: 340px; overflow-y: auto; }
    #eventBox p {
      margin: 1px 0;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 11.5px;
      color: var(--text-secondary);
    }
    #eventBox p:nth-child(odd) { background: rgba(255,255,255,.02); }

    .aside-section { margin-bottom: 16px; }
    .aside-section:last-child { margin-bottom: 0; }
    .empty-hint { color: var(--text-muted); font-style: italic; font-size: 12px; }

    .btn-block {
      width: 100%;
      padding: 6px 12px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 12px;
      margin-top: 8px;
      transition: all .15s ease;
      font-weight: 500;
    }
    .btn-block:hover { color: var(--text-primary); border-color: #3a3f55; background: #1e2238; }
    .btn-block:active { transform: scale(.98); }

    /* ─── Tool Cards (right panel) ─── */
    .tool-block {
      margin-bottom: 12px;
      padding: 14px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: border-color .2s;
    }
    .tool-block:hover { border-color: #2a2e40; }
    .tool-block label {
      font-size: 12px;
      display: block;
      margin-bottom: 4px;
      color: var(--text-secondary);
      font-weight: 500;
    }
    .tool-block label:first-child {
      color: var(--text-primary);
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 8px;
    }
    .tool-block input[type="text"] {
      width: 100%;
      margin: 6px 0;
      padding: 7px 10px;
      background: var(--bg-input);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 13px;
      transition: border-color .2s, box-shadow .2s;
    }
    .tool-block input[type="text"]:focus {
      outline: none;
      border-color: var(--border-focus);
      box-shadow: 0 0 0 2px rgba(75, 127, 255, 0.15);
    }
    .tool-block input[type="text"]::placeholder { color: var(--text-muted); }
    .tool-block button {
      width: 100%;
      padding: 7px 12px;
      background: var(--accent);
      border: 1px solid var(--accent);
      color: #fff;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      margin-top: 8px;
      transition: all .15s ease;
      letter-spacing: .02em;
    }
    .tool-block button:hover { background: var(--accent-hover); }
    .tool-block button:active { transform: scale(.97); }

    /* Checkbox styling */
    .tool-block input[type="checkbox"] {
      accent-color: var(--accent);
      width: 14px;
      height: 14px;
      margin: 0;
      cursor: pointer;
    }
    .tool-block .checkbox-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 4px 0;
      white-space: nowrap;
    }

    /* ─── Toast ─── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      padding: 9px 22px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: all .25s cubic-bezier(.4, 0, .2, 1);
      box-shadow: 0 4px 20px rgba(0,0,0,.4);
      backdrop-filter: blur(8px);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast:not(.warn) {
      background: var(--success-bg);
      color: var(--success);
      border: 1px solid rgba(61, 214, 140, 0.2);
    }
    .toast.warn {
      background: var(--warn-bg);
      color: var(--warn);
      border: 1px solid rgba(255, 212, 121, 0.2);
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
</head>
<body>
<header>
  <h1>ADOFAI 谱面处理工具</h1>
  <input type="file" id="fileInput" accept=".adofai">
  <button class="btn-primary" id="importBtn">导入谱面</button>
  <span class="file-name" id="fileName"></span>
  <button class="btn-primary" id="exportBtn" style="margin-left:auto">导出谱面</button>
</header>
<main>
  <!-- 左侧栏: 标签 & 事件 -->
  <aside>
    <div class="aside-section">
      <h2>谱面标签</h2>
      <div id="tagBox"><span class="empty-hint">请先导入谱面</span></div>
      <button class="btn-block" id="copyTagsBtn">复制所有标签</button>
    </div>
    <div class="aside-section">
      <h2>事件统计</h2>
      <div id="eventBox"><span class="empty-hint">请先导入谱面</span></div>
    </div>
  </aside>

  <!-- 中间: 编辑器 -->
  <section class="editor">
    <h2>
      谱面视图
      <span class="editor-toolbar" style="margin-left:auto">
        <span class="fold-btns" id="foldBtns">
          <button id="foldAllBtn" title="折叠全部">⊟</button>
          <button id="unfoldAllBtn" title="展开全部">⊞</button>
        </span>
        <button class="toggle-readonly" id="toggleReadOnly">只读</button>
      </span>
    </h2>
    <div id="monacoContainer"></div>
    <textarea id="hiddenEditor" spellcheck="false" style="display:none">
使用教程:
    1.首先导入谱面
    使用前缀增加
        2.在右侧工具 替换 tag / eventTag 前缀 输入你需要的前缀
        3.点击确认替换，在左侧栏 谱面包含的Tag 确认你的更改
        4.导出谱面
        
    使用图片前缀增加:
        2.在右侧工具 为图片名添加前缀 输入你需要的前缀
        3.点击确认替换，需要将你谱面文件夹的同步增加你的前缀
        4.导出谱面
        
    使用替换所有 ease 为 Out Elastic 功能:
        2.在右侧工具 替换所有 ease 为 Out Elastic 查看勾选需要的功能
        3.点击确认替换
        4.导出谱面
    提示: 左侧栏 谱面包含的Tag 就是你谱面的所有Tag
    你可以将标签全部复制放到你的Part结尾，来隐藏所有装饰
    </textarea>
  </section>

  <!-- 右侧栏: 工具 -->
  <section class="tools">
    <h2>工具</h2>
    <div class="tool-block">
      <label>替换 tag / eventTag 前缀</label>
      <input id="prefixInput" placeholder="例如：p1_">
      <button id="replaceTagPrefixBtn">确认替换</button>
    </div>
    <div class="tool-block">
      <label>为图片名添加前缀</label>
      <input id="imagePrefixInput" placeholder="例如：p1_">
      <button id="replaceImagePrefixBtn">确认替换</button>
    </div>
    <div class="tool-block">
      <label>替换所有 ease 为 Out Elastic</label>
      <label class="checkbox-row">
        <input type="checkbox" id="includeLinearCheck">
        包括 Linear
      </label>
      <button id="replaceEaseBtn">确认替换</button>
    </div>
  </section>
</main>
<div class="toast" id="toast"></div>
<script>
  // ── DOM 引用 ──
  const $ = (id) => document.getElementById(id);
  const fileInput   = $('fileInput');
  const monacoContainer = $('monacoContainer');
  const hiddenEditor   = $('hiddenEditor');
  const tagBox      = $('tagBox');
  const eventBox    = $('eventBox');
  const fileName    = $('fileName');
  const toast       = $('toast');
  const importBtn   = $('importBtn');
  const exportBtn   = $('exportBtn');
  const copyTagsBtn = $('copyTagsBtn');
  const replaceTagPrefixBtn = $('replaceTagPrefixBtn');
  const replaceImagePrefixBtn = $('replaceImagePrefixBtn');
  const replaceEaseBtn = $('replaceEaseBtn');
  const toggleReadOnlyBtn = $('toggleReadOnly');

  // ── Monaco 编辑器 ──
  let monacoEditor = null;

  function getEditorContent() {
    return monacoEditor ? monacoEditor.getValue() : hiddenEditor.value;
  }

  function setEditorContent(value) {
    hiddenEditor.value = value;
    if (monacoEditor && monacoEditor.getValue() !== value) {
      monacoEditor.setValue(value);
    }
  }

  function autoFold() {
    if (!monacoEditor) return;
    monacoEditor.trigger('fold', 'editor.unfoldAll', null);
    setTimeout(() => {
      monacoEditor.trigger('fold', 'editor.foldLevel1', null);
    }, 50);
  }

  require.config({
    paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' }
  });

  require(['vs/editor/editor.main'], function () {
    // 自定义深色主题
    monaco.editor.defineTheme('adofaiDark', {
      base: 'vs-dark',
      inherit: true,
      rules: [
        { token: 'string.key.json', foreground: '9aa4ff' },
        { token: 'string.value.json', foreground: '7dffb3' },
        { token: 'number.json', foreground: 'ffd479' },
        { token: 'keyword.json', foreground: 'ff5e8a' },
      ],
      colors: {
        'editor.background': '#090b11',
        'editor.foreground': '#e4e6f0',
        'editorLineNumber.foreground': '#3a3f55',
        'editorLineNumber.activeForeground': '#8b8fa6',
        'editor.selectionBackground': '#2b4a8a',
        'editor.inactiveSelectionBackground': '#1e2d5c',
        'editorCursor.foreground': '#4b7fff',
        'editor.lineHighlightBackground': '#0d0f17',
        'editor.lineHighlightBorder': '#0d0f17',
        'editorIndentGuide.background': '#1a1d2e',
        'editorIndentGuide.activeBackground': '#2a2f44',
      }
    });

    monacoEditor = monaco.editor.create(monacoContainer, {
      value: hiddenEditor.value,
      language: 'json',
      theme: 'adofaiDark',
      readOnly: true,
      automaticLayout: false,
      minimap: { enabled: true, scale: 1, showSlider: 'mouseover' },
      fontSize: 13,
      lineHeight: 20,
      fontFamily: '"Cascadia Code", "Fira Code", "JetBrains Mono", Consolas, monospace',
      scrollBeyondLastLine: false,
      wordWrap: 'off',
      tabSize: 2,
      insertSpaces: true,
      renderWhitespace: 'selection',
      bracketPairColorization: { enabled: true },
      guides: { bracketPairs: true, indentation: true },
      smoothScrolling: true,
      cursorBlinking: 'smooth',
      cursorSmoothCaretAnimation: 'on',
      padding: { top: 8, bottom: 8 },
      folding: true,
      foldingStrategy: 'auto',
      foldingHighlight: true,
    });

    // ── ADOFAI 字段说明 (hover 提示) ──
    const adofaiFields = {
      'angleData': '🎯 轨道角度数组，每个值对应一拍的判定角度（0=左 180=右 360=一圈）',
      'settings': '⚙️ 谱面全局设置',
      'actions': '📋 事件动作列表，按 floor 排列',
      'decorations': '🎨 装饰列表',
      'floor': '📍 判定线序号，从 1 开始',
      'eventType': '🔖 事件类型（如 SetSpeed、Twirl、AddDecoration 等）',
      'tag': '🏷️ 谱面标签（用于分组过滤）',
      'eventTag': '🏷️ 事件标签（可多个，空格分隔）',
      'speedType': '⏩ 变速类型（Bpm/Multiplier）',
      'beatsPerMinute': '🎵 BPM（每分钟节拍数）',
      'bpm': '🎵 当前 BPM',
      'duration': '⏱️ 持续时间（拍数或秒数）',
      'angleOffset': '🔄 角度偏移量',
      'ease': '〰️ 缓动/缓出类型（Linear/InOut/Out/Elastic 等）',
      'eventValue': '📐 事件参数值',
      'position': '📍 坐标位置 [x, y]',
      'rotation': '🔄 旋转角度',
      'scale': '🔍 缩放比例 [x, y]',
      'opacity': '👻 不透明度（0-100）',
      'color': '🎨 颜色（如 "FF0000"）',
      'depth': '📏 层级深度（数值越大越靠前）',
      'relativeTo': '📌 相对定位参考（Player/Camera/Tile）',
      'pivotOffset': '📍 锚点偏移 [x, y]',
      'decorationImage': '🖼️ 装饰图片文件名',
      'startTile': '▶️ 起始格子位置 [x, y]',
      'endTile': '⏹️ 结束格子位置 [x, y]',
      'countdownTicks': '🔢 倒计时节拍数',
      'trackAnimation': '🎬 轨道出现动画',
      'trackDisappearAnimation': '🌫️ 轨道消失动画',
      'trackAppearAnimation': '✨ 轨道出现动画',
      'planets': '🪐 行星设置',
      'planetRenderMode': '🔮 行星渲染模式',
      'bgImage': '🖼️ 背景图片',
      'bgVideo': '🎥 背景视频',
      'parallax': '🌌 视差效果',
      'additionalLights': '💡 额外光源设置',
      'hitSound': '🔊 打击音效',
      'hitSoundVolume': '🔉 打击音效音量',
      'zoom': '🔎 缩放倍数',
      'filter': '🎞️ 滤镜效果',
      'vignette': '🌑 暗角效果',
      'chromatic': '🌈 色差（Chromatic Aberration）',
      'grain': '📺 噪点效果',
      'blur': '🌫️ 模糊效果',
      'pulse': '💓 脉冲效果',
      'shake': '📳 震动效果',
      'bloom': '✨ 绽放/Bloom 效果',
      'pixelate': '👾 像素化效果',
      'barOfEntries': '🎼 小节位置/入口',
      'conditionalEvents': '🔀 条件事件',
      'disableEvents': '🚫 禁用的默认事件',
      'holdStart': '✋ 长按开始',
      'holdEnd': '✋ 长按结束',
    };

    monaco.languages.registerHoverProvider('json', {
      provideHover: function (model, position) {
        const word = model.getWordAtPosition(position);
        if (!word) {
          // 试试匹配整行的 key
          const line = model.getLineContent(position.lineNumber);
          const m = line.match(/"(\w+)"\s*:/);
          if (m && adofaiFields[m[1]]) {
            return {
              range: new monaco.Range(position.lineNumber, line.indexOf('"' + m[1] + '"') + 1,
                                      position.lineNumber, line.indexOf('"' + m[1] + '"') + m[1].length + 2),
              contents: [{ value: adofaiFields[m[1]] }]
            };
          }
          return null;
        }
        const key = word.word;
        if (adofaiFields[key]) {
          return {
            range: new monaco.Range(position.lineNumber, word.startColumn,
                                    position.lineNumber, word.endColumn),
            contents: [{ value: adofaiFields[key] }]
          };
        }
        return null;
      }
    });

    // 内容变化时同步并刷新面板
    monacoEditor.onDidChangeModelContent(() => {
      hiddenEditor.value = monacoEditor.getValue();
      refreshAll();
    });

    // 折叠/展开按钮
    const foldAllBtn = document.getElementById('foldAllBtn');
    const unfoldAllBtn = document.getElementById('unfoldAllBtn');
    foldAllBtn.addEventListener('click', () => {
      monacoEditor.trigger('fold', 'editor.foldAll', null);
    });
    unfoldAllBtn.addEventListener('click', () => {
      monacoEditor.trigger('fold', 'editor.unfoldAll', null);
    });

    // 窗口大小变化时重新布局
    window.addEventListener('resize', () => {
      if (monacoEditor) monacoEditor.layout();
    });

    // 初始化完成，如果已有内容则刷新
    if (hiddenEditor.value) { refreshAll(); autoFold(); }
  });

  // ── 事件名中文映射 ──
  const eventNameMap = {
    'MoveCamera':'移动摄像头','Flash':'闪光','SetSpeed':'设置速度','Twirl':'旋转','Pause':'暂停','PositionTrack':'轨道位置',
    'ShakeScreen':'屏幕震动','AnimateTrack':'轨道动画','CustomBackground':'自定义背景','AddDecoration':'添加装饰','AddText':'添加文本',
    'AddParticle':'添加粒子','PlaySound':'播放音效','Checkpoint':'检查点','EditorComment':'编辑器注释','Bookmark':'书签',
    'SetObject':'设置对象','MoveTrack':'移动轨道','RepeatEvents':'重复事件','SetFrameRate':'设置帧率','SetParticle':'设置粒子效果',
    'ColorTrack':'设置轨道颜色','RecolorTrack':'重新设置轨道颜色','SetFilter':'设置滤镜','SetFilterAdvanced':'设置高级滤镜','Bloom':'绽放',
    'ScalePlanets':'缩放行星','HallOfMirrors':'镜厅','MoveDecorations':'移动装饰','SetText':'设置文本','SetDefaultText':'设置默认文本',
    'AutoPlayTiles':'自动播放','SetPlanetRotation':'设置行星移动轨迹','ScreenScroll':'屏幕滚动','ScaleRadius':'缩放半径','SetHitsound':'设置打拍音',
    'Hide':'隐藏判定/隐藏轨道图标','EmitParticle':'发射粒子','ScreenTile':'平铺','SetConditionalEvents':'设置条件事件',
    'Hold':'长按','FreeRoam':'自由移动','ScaleMargin':'设置缩放半径','AddObject':'设置对象'
  };

  let currentFile = null;

  // ── Toast ──
  let toastTimer;
  function showToast(msg, warn = false) {
    toast.textContent = msg;
    toast.className = 'toast ' + (warn ? 'warn' : '') + ' show';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
  }

  // ── 只读 / 编辑切换 ──
  let isEditing = false;
  function setEditorMode(editing) {
    isEditing = editing;
    toggleReadOnlyBtn.textContent = editing ? '编辑中' : '只读';
    toggleReadOnlyBtn.classList.toggle('editing', editing);
    if (monacoEditor) monacoEditor.updateOptions({ readOnly: !editing });
  }
  toggleReadOnlyBtn.addEventListener('click', () => setEditorMode(!isEditing));

  // ── 文件导入 ──
  importBtn.addEventListener('click', () => { fileInput.value = ''; fileInput.click(); });
  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (!file) return;
    currentFile = file;
    fileName.textContent = file.name;
    const reader = new FileReader();
    reader.onload = () => {
      setEditorContent(reader.result);
      refreshAll();
      autoFold();
      showToast(`已导入: ${file.name}`);
    };
    reader.onerror = () => showToast('文件读取失败', true);
    reader.readAsText(file, 'utf-8');
  });

  // ── 文件导出 ──
  exportBtn.addEventListener('click', () => {
    const content = getEditorContent();
    if (!content.trim()) { showToast('请先导入谱面', true); return; }
    const defaultName = currentFile ? currentFile.name.replace(/\.adofai$/i, '') : 'level';
    const name = prompt('请输入导出的文件名（不含扩展名）', defaultName);
    if (!name) return;
    const blob = new Blob(['\uFEFF' + content], { type: 'text/plain;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name + '.adofai';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    showToast(`已导出: ${name}.adofai`);
  });

  // ── 刷新所有面板 ──
  function refreshAll() {
    analyzeTags();
    updateEventList();
  }

  // ── Tag 分析 ──
  function analyzeTags() {
    const tags = [];
    const re = /"tag"\s*:\s*"([^"]*)"/g;
    let m;
    const content = getEditorContent();
    while ((m = re.exec(content)) !== null) {
      m[1].split(/\s+/).filter(Boolean).forEach(t => tags.push(t));
    }
    const uniqueTags = [...new Set(tags)].sort();
    tagBox.textContent = uniqueTags.length ? uniqueTags.join(' ') : '-';
  }

  // ── 事件统计 ──
  function updateEventList() {
    const count = {};
    const re = /"eventType"\s*:\s*"([^"]*)"/g;
    let m;
    const content = getEditorContent();
    while ((m = re.exec(content)) !== null) {
      const name = m[1];
      if (name === 'Twirl' || name === 'SetSpeed' || name === 'Pause' || name === 'PositionTrack') continue;
      const label = eventNameMap[name] || name;
      count[label] = (count[label] || 0) + 1;
    }
    const entries = Object.entries(count);
    eventBox.innerHTML = entries.length
      ? entries.map(([k, v]) => `<p>${k} (${v})</p>`).join('')
      : '<span class="empty-hint">未检测到事件</span>';
  }

  // ── 复制标签 ──
  copyTagsBtn.addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(tagBox.textContent);
      showToast('已复制到剪贴板');
    } catch { showToast('复制失败', true); }
  });

  // ── Tag 前缀替换 ──
  replaceTagPrefixBtn.addEventListener('click', () => {
    const prefix = document.getElementById('prefixInput').value;
    if (!prefix) { showToast('请输入前缀', true); return; }
    setEditorContent(getEditorContent().replace(
      /"(tag|eventTag)"\s*:\s*"([^"]*)"/g,
      (_, key, content) =>
        `"${key}": "${content.split(/\s+/).filter(Boolean).map(t => prefix + t).join(' ')}"`
    ));
    refreshAll();
    showToast('Tag 前缀已替换');
  });

  // ── 图片前缀替换 ──
  replaceImagePrefixBtn.addEventListener('click', () => {
    const prefix = document.getElementById('imagePrefixInput').value;
    if (!prefix) { showToast('请输入前缀', true); return; }
    let count = 0;
    setEditorContent(getEditorContent().replace(
      /"decorationImage"\s*:\s*"([^"]*)"/g,
      (match, filename) => {
        if (filename.startsWith(prefix)) return match;
        count++;
        return `"decorationImage": "${prefix}${filename}"`;
      }
    ));
    refreshAll();
    showToast(count ? `已为 ${count} 个图片添加前缀` : '没有需要修改的图片（可能已添加过前缀）');
  });

  // ── ease → Elastic 替换 ──
  replaceEaseBtn.addEventListener('click', () => {
    const includeLinear = document.getElementById('includeLinearCheck').checked;
    let count = 0;
    setEditorContent(getEditorContent().replace(
      /"ease"\s*:\s*"([^"]*)"/g,
      (match, easeType) => {
        if (easeType === 'Elastic') return match;
        if (!includeLinear && easeType === 'Linear') return match;
        count++;
        return '"ease": "OutElastic"';
      }
    ));
    refreshAll();
    showToast(count ? `已替换 ${count} 个 ease → Out Elastic` : '没有需要替换的 ease（可能已是 Out Elastic 或被排除）');
  });
</script>
</body>
</html>
